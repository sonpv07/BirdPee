<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <link rel="stylesheet" href="../css/Profile.css">

        crossorigin="anonymous" referrerpolicy="no-referrer" />
        <link rel="icon" type="image/x-icon" href="images/logo2.png" />

</head>

<body>
    <header>
        <div class="header__logo">
          <a href="homepage.html"><img src="images/Logo.png" alt="" /></a>
        </div>
  
        <div class="header__search-bar">
          <input type="text" placeholder="Find something you need" />
          <i class="fas fa-solid fa-magnifying-glass"></i>
          <div class="nav">
            <p><a href="homepage.html">Home Page</a></p>
            <p><a href="productlist.html">For Bird</a></p>
            <p><a href="shoplist.html">Shop List</a></p>
            <p><a href="shopowner/dashboard.html">Shop Owner Page</a></p>
          </div>
        </div>
  
        <div class="header__icon">
          <ul>
            <a href="Login.html">
              <li>
                <div class="header__icon_circle">
                  <i class="fas fa-solid fa-user"></i>
                </div>
                <h3>Login/Register</h3>
              </li>
            </a>
            <a href="Notification.html">
              <li>
                <div class="header__icon_circle noti" current-count="6">
                  <i class="fas fa-solid fa-bell"></i>
                </div>
                <h3>Notification</h3>
              </li>
            </a>
            <a href="cart.html">
              <li>
                <div class="header__icon_circle shopping-bag" current-count="8">
                  <i class="fas fa-solid fa-bag-shopping"></i>
                </div>
                <h3>Shopping Cart</h3>
              </li>
            </a>
          </ul>
        </div>
      </header>
    <main>
        <div class="profile">
            <img src="../images/blank-avatar.png" alt="avatar">
            <h2>USER NAME</h2>
            <h3>abcdefgh@gmail.com</h3>
            <p>09/10/2003</p>
            <a href="#">Change Password</a>
            <a href="#">Update profile</a>
            <a href="#">Notification</a>
        </div>
        <div class="update">
            <div class="name">
                <p>First name</p>
                <p>Last name</p>
            </div>
            <div class="inputName">
                <input type="text" id="Firstname" name="firstname" value="">
                <input type="text" id="Lastname" name="lastname" value="">
            </div>
            <div class="email">
                <p>Email</p>
            </div>
            <div class="inputEmail">
                <input type="text" id="Email" name="email" value="">
            </div>
            <div class="info">
                <p>Gender</p>
                <p>Date of birth</p>
            </div>
            <div class="inputInfo">
                <select name="gender" id="genders">
                    <option value="Man">Man</option>
                    <option value="Women">Women</option>
                </select>
                
                    <input type="date" id="birthday" name="birthday">
                
            </div>
            <div class="address">
                <p>Address</p>
            </div>
            <div class="inputAddress">
                <input type="text" id="Address" name="address" value="">
            </div>
            <div class="phonenumber">
                <p>Phone number</p>
            </div>
            <div class="inputPhonenumber">
                <input type="tel" id="phone" name="phone" pattern="[0-9]{3}-[0-9]{2}-[0-9]{3}">
            </div>
            <div>

            </div>
            <div class="button">
                <button type="submit">BACK</button>
                <button type="submit">SAVE PROFILE</button>
            </div>
        </div>
    </main>
</body>

</html>
