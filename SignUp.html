<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="../css/SignUp.css">
    <link rel="icon" type="image/x-icon" href="images/logo2.png" />

</head>
<body>
    <div class="Main_SignUp">
        <div class="container">
            <h1>
                <div class="title">Sign Up</div>
            </h1>
            <div class="form">
                <div class="inputBox1">
                    <input type="text" id="Email" name="email" placeholder="Email">
                </div>
                <div class="inputBox2">
                    <input type="text" id="Name" name="name" placeholder="Name">
                </div>
                <div class="inputBox3">
                    <input type="password" id="pass" name="password" placeholder="Password">
                </div>
                <div class="inputBox4">
                    <input type="password" id="confirned_pass" name="password" placeholder="Password">
                </div>     
            </div>   
            <div class="justify">
            <div class="checkbox_container">
                <div class="checkbox">
                    <input type="checkbox" name="agree" ">&nbsp;&nbsp; I agree all statements in  <a href="TermOfServices.html" class="signUp">Terms of service</a>
                </div>  
            </div>
            
                <div class="inputButton">
                    <button type="submit">Register</button>
                </div>
                       <div>
                        Already have account ? <a href="Login.html" class="signUp">Login</a>
                    </div>  
            </div>
            
                   </div>  
        </div>
    </div>
    <div class="image">
        <img src="../images/Bird pic.png" alt="bird">
    </div>
</body>
</html>
