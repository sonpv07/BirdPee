<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/Login.css">
    <title>Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
        <link rel="icon" type="image/x-icon" href="images/logo2.png" />

</head>

<body>
    <div class="Main_Login">
        <div class="container">
            <h1>
                <div class="title">Login</div>
            </h1>
            <div class="form">
                <div class="inputBox1">
                    <input type="text" id="Email" name="email" placeholder="Email">
                </div>
                <div class="inputBox2">
                    <input type="password" id="pass" name="password" placeholder="Password">
                </div>
                <div class="inputButton">
                    <button type="submit">Login</button>
                </div>
            </div>
            <div class="linkContainer">
                <a href="SignUp.html" class="signUp">Sign Up</a>
                <a href="#" class="forgot">Forgot password ?</a>
            </div>
            <span class="line">OR</span>
            <div class="linkbutton">
                <div class="linkbutton1"><button type="submit"><i class="fas fa-brands fa-facebook-f" style="color: 
                    #ffffff;"></i>&nbsp;&nbsp;&nbsp;&nbsp;Facebook</button>
                </div>
                <div class="linkbutton2">
                    <button type="submit"><i class="fas fa-brands fa-google-plus-g" style="color: #ffffff;"></i>&nbsp;&nbsp;&nbsp;&nbsp;Google</button>
                </div>
            </div>
            
        </div>

    </div>
    <div class="image">
        <img src="images/Bird pic.png" alt="bird">
    </div>
</body>

</html>
